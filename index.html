  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5A623;
      --gold-dark: #D4891A;
      --text-dark: #1A1A1A;
      --text-mid: #4A4A4A;
      --text-light: #6B6B6B;
      --border: #E8E8E8;
      --bg: #FFFFFF;
      --section-alt: #FAFAFA;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav img.nav-logo {
      height: 52px;
      width: auto;
    }

    @media (max-width: 600px) {
      nav img.nav-logo { height: 44px; }
    }

    .lang-toggle {
      background: none;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, color 0.2s;
    }
    .lang-toggle:hover {
      background: var(--gold);
      color: #fff;
    }

    /* ── HERO ── */
    .hero {
      padding: 96px 32px 80px;
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-logo {
      width: min(280px, 70vw);
      margin-bottom: 40px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: var(--gold);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: var(--text-mid);
      max-width: 540px;
      margin: 0 auto 16px;
    }

    .hero-tagline {
      font-size: 1rem;
      color: var(--text-light);
      font-style: italic;
      margin-bottom: 40px;
    }

    .btn-book {
      position: relative;
      display: inline-block;
    }

    .btn-book-link {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 8px;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-book-link:hover { background: var(--gold-dark); transform: translateY(-1px); }

    /* ── SECTIONS ── */
    section {
      padding: 72px 32px;
    }

    .section-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    section h2 {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 20px;
      line-height: 1.2;
    }

    section p {
      color: var(--text-mid);
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .alt-bg { background: var(--section-alt); }

    .who-closing {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dark);
      border-top: 2px solid var(--gold);
      padding-top: 20px;
      margin-top: 8px;
    }

    /* ── SERVICE LIST ── */
    .service-list {
      list-style: none;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .service-list li {
      position: relative;
      padding-left: 28px;
      color: var(--text-mid);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .service-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--gold);
      font-weight: 700;
    }

    /* ── HOW IT WORKS ── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 32px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .step:last-child { border-bottom: none; }

    .step-num {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-text {
      padding-top: 6px;
      font-size: 1.05rem;
      color: var(--text-mid);
    }

    .step-comment {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--text-light);
      font-style: italic;
      padding-left: 4px;
    }

    /* ── WHO WE ARE ── */
    .who-grid {
      display: grid;
      gap: 24px;
    }

    /* ── SERVICE AREA ── */
    .area-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .area-tag {
      background: #FFF8EC;
      border: 1.5px solid var(--gold);
      color: var(--gold-dark);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 24px;
    }

    /* ── CONTACT ── */
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 28px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 1rem;
      font-weight: 500;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .contact-link:hover {
      border-color: var(--gold);
      background: #FFF8EC;
    }

    /* ── WHY OILRIGHT ── */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-top: 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .compare-col-header {
      padding: 16px 20px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }

    .compare-col-header.grey {
      background: #F0F0F0;
      color: #888;
      border-bottom: 1px solid #DCDCDC;
    }

    .compare-col-header.color {
      background: var(--gold);
      color: #fff;
      border-bottom: 1px solid var(--gold-dark);
    }

    .compare-col-header.color img {
      height: 28px;
      width: auto;
      display: block;
      margin: 0 auto;
      filter: brightness(0) invert(1);
    }

    .compare-row {
      display: contents;
    }

    .compare-cell {
      padding: 18px 20px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .compare-row:last-child .compare-cell {
      border-bottom: none;
    }

    .compare-cell.grey {
      background: #FAFAFA;
      color: #888;
    }

    .compare-cell.color {
      background: #FFFBF2;
      color: var(--text-dark);
      font-weight: 500;
    }

    .compare-cell .icon {
      flex-shrink: 0;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .compare-cell { padding: 14px 14px; font-size: 0.88rem; }
      .compare-col-header { padding: 12px 14px; }
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px;
      text-align: center;
    }

    .footer-social {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .footer-social a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .footer-social a:hover { color: var(--gold); }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 12px 20px; }
      .hero { padding: 64px 20px 60px; }
      section { padding: 56px 20px; }
      footer { padding: 28px 20px; }
    }
  </style>

<script>
  let lang = 'en';

  function setLang(l) {
    lang = l;
    document.documentElement.lang = l;
    document.getElementById('langBtn').textContent = l === 'en' ? 'FR' : 'EN';

    document.querySelectorAll('[data-en]').forEach(el => {
      const val = el.getAttribute('data-' + l);
      if (val) el.innerHTML = val;
    });
  }

  function toggleLang() {
    setLang(lang === 'en' ? 'fr' : 'en');
  }

  // Init English
  setLang('en');
</script>
